# WZMediaPlayer 自动化测试路径配置
# 修改此文件即可统一调整各脚本使用的 EXE 与测试视频路径，无需改代码

[paths]
# 播放器可执行文件路径（CMake 构建通常为 build/Release/WZMediaPlayer.exe）
exe_path = D:\2026Github\build\Release\WZMediaPlayer.exe

# 默认测试视频路径（普通播放、Seek、音视频同步等）
test_video_path = D:\2026Github\testing\video\test.mp4

# 3D 测试视频路径（留空则使用 test_video_path）
test_3d_video_path = D:\2026Github\testing\video\test.mp4
